{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "otel-up.componentFullname" (merge (dict "component" "prometheus") .) }}
  labels:
    {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "prometheus") .) | nindent 4 }}
spec:
  type: {{ .Values.prometheus.service.type }}
  ports:
    - name: http
      port: {{ .Values.prometheus.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "prometheus") .) | nindent 4 }}
{{- end }}
