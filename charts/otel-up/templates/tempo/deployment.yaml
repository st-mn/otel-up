{{- if .Values.tempo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "otel-up.componentFullname" (merge (dict "component" "tempo") .) }}
  labels:
    {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "tempo") .) | nindent 4 }}
spec:
  replicas: {{ .Values.tempo.replicas }}
  selector:
    matchLabels:
      {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "tempo") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "tempo") .) | nindent 8 }}
      annotations:
        checksum/config: {{ include "otel-up.tempoConfig" . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tempo
          image: "{{ .Values.tempo.image.repository }}:{{ .Values.tempo.image.tag }}"
          imagePullPolicy: {{ .Values.tempo.image.pullPolicy }}
          args:
            - "-config.file=/etc/tempo/tempo.yaml"
          ports:
            - name: http
              containerPort: 3200
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
              readOnly: true
            - name: storage
              mountPath: /tmp/tempo
          resources:
            {{- toYaml .Values.tempo.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "otel-up.componentFullname" (merge (dict "component" "tempo") .) }}
        - name: storage
          {{- if .Values.tempo.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "otel-up.componentFullname" (merge (dict "component" "tempo") .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otel-up.componentFullname" (merge (dict "component" "tempo") .) }}
  labels:
    {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "tempo") .) | nindent 4 }}
data:
  tempo.yaml: |
    {{- include "otel-up.tempoConfig" . | nindent 4 }}
{{- if .Values.tempo.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "otel-up.componentFullname" (merge (dict "component" "tempo") .) }}
  labels:
    {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "tempo") .) | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.tempo.persistence.size }}
  {{- if .Values.tempo.persistence.storageClass }}
  storageClassName: {{ .Values.tempo.persistence.storageClass }}
  {{- end }}
{{- end }}
{{- end }}
