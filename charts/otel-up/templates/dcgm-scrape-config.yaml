{{- if and .Values.gpuMetrics.enabled .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otel-up.fullname" . }}-dcgm-scrape
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otel-up.labels" . | nindent 4 }}
data:
  gpu-scrape.yaml: |
    - job_name: 'dcgm-exporter'
      scrape_interval: {{ .Values.gpuMetrics.scrapeInterval }}
      static_configs:
        - targets:
            - 'dcgm-exporter.{{ .Release.Namespace }}.svc.cluster.local:9400'
      metric_relabel_configs:
        - source_labels: [__name__]
          regex: >-
            DCGM_FI_DEV_GPU_UTIL|DCGM_FI_DEV_FB_USED|DCGM_FI_DEV_FB_FREE|
            DCGM_FI_DEV_POWER_USAGE|DCGM_FI_DEV_SM_CLOCK|DCGM_FI_DEV_MEMORY_CLOCK|
            DCGM_FI_DEV_GPU_TEMP|DCGM_FI_DEV_THERMAL_VIOLATION_COUNT|
            DCGM_FI_DEV_XID_ERRORS|DCGM_FI_PROF_PIPE_TENSOR_ACTIVE|
            DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL|DCGM_FI_PROF_DRAM_ACTIVE
          action: keep
{{- end }}
