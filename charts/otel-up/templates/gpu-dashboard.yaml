{{- if and .Values.gpuDashboard.enabled .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otel-up.fullname" . }}-gpu-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otel-up.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  gpu-dashboard.json: |-
    {
      "title": "NVIDIA GPU Metrics",
      "uid": "nvidia-gpu-otelup",
      "schemaVersion": 38,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "GPU Utilization (%)",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [{"expr": "DCGM_FI_DEV_GPU_UTIL", "legendFormat": "GPU {{gpu}} — {{instance}}"}]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Framebuffer Memory Used (MiB)",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [{"expr": "DCGM_FI_DEV_FB_USED", "legendFormat": "GPU {{gpu}} — {{instance}}"}]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Power Draw (W)",
          "gridPos": {"x": 0, "y": 8, "w": 8, "h": 8},
          "targets": [{"expr": "DCGM_FI_DEV_POWER_USAGE", "legendFormat": "GPU {{gpu}} — {{instance}}"}]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "GPU Temperature (°C)",
          "gridPos": {"x": 8, "y": 8, "w": 8, "h": 8},
          "targets": [{"expr": "DCGM_FI_DEV_GPU_TEMP", "legendFormat": "GPU {{gpu}} — {{instance}}"}]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Tensor Core Active (ratio)",
          "gridPos": {"x": 16, "y": 8, "w": 8, "h": 8},
          "targets": [{"expr": "DCGM_FI_PROF_PIPE_TENSOR_ACTIVE", "legendFormat": "GPU {{gpu}} — {{instance}}"}]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "SM Clock (MHz)",
          "gridPos": {"x": 0, "y": 16, "w": 8, "h": 8},
          "targets": [{"expr": "DCGM_FI_DEV_SM_CLOCK", "legendFormat": "GPU {{gpu}} — {{instance}}"}]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "NVLink Bandwidth (MB/s)",
          "gridPos": {"x": 8, "y": 16, "w": 8, "h": 8},
          "targets": [{"expr": "DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL", "legendFormat": "GPU {{gpu}} — {{instance}}"}]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "DRAM Active (ratio)",
          "gridPos": {"x": 16, "y": 16, "w": 8, "h": 8},
          "targets": [{"expr": "DCGM_FI_PROF_DRAM_ACTIVE", "legendFormat": "GPU {{gpu}} — {{instance}}"}]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "XID Errors (critical)",
          "gridPos": {"x": 0, "y": 24, "w": 12, "h": 8},
          "targets": [{"expr": "increase(DCGM_FI_DEV_XID_ERRORS[5m])", "legendFormat": "GPU {{gpu}} — {{instance}}"}]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Thermal Throttle Events",
          "gridPos": {"x": 12, "y": 24, "w": 12, "h": 8},
          "targets": [{"expr": "increase(DCGM_FI_DEV_THERMAL_VIOLATION_COUNT[5m])", "legendFormat": "GPU {{gpu}} — {{instance}}"}]
        }
      ]
    }
{{- end }}
