{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "otel-up.componentFullname" (merge (dict "component" "grafana") .) }}
  labels:
    {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "grafana") .) | nindent 4 }}
spec:
  replicas: {{ .Values.grafana.replicas }}
  selector:
    matchLabels:
      {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "grafana") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "grafana") .) | nindent 8 }}
   spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
            {{- if .Values.grafana.anonymousAccess.enabled }}
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: {{ .Values.grafana.anonymousAccess.role | quote }}
            {{- end }}
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: "traceqlEditor"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: storage
          {{- if .Values.grafana.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "otel-up.componentFullname" (merge (dict "component" "grafana") .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: datasources
          configMap:
            name: {{ include "otel-up.componentFullname" (merge (dict "component" "grafana") .) }}-datasources
        - name: dashboards-provider
          configMap:
            name: {{ include "otel-up.componentFullname" (merge (dict "component" "grafana") .) }}-dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otel-up.componentFullname" (merge (dict "component" "grafana") .) }}-datasources
  labels:
    {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "grafana") .) | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      {{- if .Values.prometheus.enabled }}
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "otel-up.componentFullname" (merge (dict "component" "prometheus") .) }}:{{ .Values.prometheus.service.port }}
        isDefault: true
        editable: true
      {{- end }}
      {{- if .Values.loki.enabled }}
      - name: Loki
        type: loki
        access: proxy
        url: http://{{ include "otel-up.componentFullname" (merge (dict "component" "loki") .) }}:{{ .Values.loki.service.port }}
        editable: true
      {{- end }}
      {{- if .Values.tempo.enabled }}
      - name: Tempo
        type: tempo
        access: proxy
        url: http://{{ include "otel-up.componentFullname" (merge (dict "component" "tempo") .) }}:{{ .Values.tempo.service.httpPort }}
        editable: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: '-5m'
            spanEndTimeShift: '5m'
          serviceMap:
            datasourceUid: prometheus
          search:
            hide: false
          nodeGraph:
            enabled: true
      {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otel-up.componentFullname" (merge (dict "component" "grafana") .) }}-dashboards
  labels:
    {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "grafana") .) | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards
{{- if .Values.grafana.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "otel-up.componentFullname" (merge (dict "component" "grafana") .) }}
  labels:
    {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "grafana") .) | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.grafana.persistence.size }}
  {{- if .Values.grafana.persistence.storageClass }}
  storageClassName: {{ .Values.grafana.persistence.storageClass }}
  {{- end }}
{{- end }}
{{- if .Values.grafana.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "otel-up.componentFullname" (merge (dict "component" "grafana") .) }}
  labels:
    {{- include "otel-up.componentSelectorLabels" (merge (dict "component" "grafana") .) | nindent 4 }}
  {{- with .Values.grafana.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.grafana.ingress.className }}
  ingressClassName: {{ .Values.grafana.ingress.className }}
  {{- end }}
  {{- if .Values.grafana.ingress.tls }}
  tls:
    {{- toYaml .Values.grafana.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.grafana.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "otel-up.componentFullname" (merge (dict "component" "grafana") $) }}
                port:
                  number: {{ $.Values.grafana.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
